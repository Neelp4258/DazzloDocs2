<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DazzloDocs - Professional Document Generator</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/logo.png" alt="DazzloDocs Logo" class="logo">
            <div class="title">
                <h1>DazzloDocs</h1>
                <h2>Professional Document Generator</h2>
            </div>
        </div>

        <nav class="main-nav">
            <a href="/" class="active">Home</a>
            <a href="/about">About</a>
            <a href="/services">Services</a>
            <a href="/contact">Contact</a>
        </nav>

        <form id="documentForm" class="document-form">
            <!-- Personal Information -->
            <section class="form-section">
                <h3>Personal Information</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="student_name">Full Name*</label>
                        <input type="text" id="student_name" name="student_name" required>
                    </div>
                    <div class="form-group">
                        <label for="class">Class*</label>
                        <input type="text" id="class" name="class" required>
                    </div>
                    <div class="form-group">
                        <label for="roll_number">Roll Number*</label>
                        <input type="text" id="roll_number" name="roll_number" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject*</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    <div class="form-group">
                        <label for="subject_teacher">Subject Teacher*</label>
                        <input type="text" id="subject_teacher" name="subject_teacher" required>
                    </div>
                    <div class="form-group">
                        <label for="assignment_topic">Assignment Topic*</label>
                        <input type="text" id="assignment_topic" name="assignment_topic" required>
                    </div>
                    <!-- Optional Fields -->
                    <div class="form-group">
                        <label for="project_date">Project Date</label>
                        <input type="date" id="project_date" name="project_date">
                    </div>
                    <div class="form-group">
                        <label for="submission_date">Submission Date</label>
                        <input type="date" id="submission_date" name="submission_date">
                    </div>
                    <div class="form-group">
                        <label for="contact_number">Contact Number</label>
                        <input type="tel" id="contact_number" name="contact_number">
                    </div>
                </div>
                <div class="form-group full-width">
                    <label for="self_introduction">Self Introduction</label>
                    <textarea id="self_introduction" name="self_introduction" rows="4"></textarea>
                </div>
            </section>

            <!-- Document Template Selection -->
            <section class="form-section">
                <h3>Document Template</h3>
                <div class="form-group">
                    <label for="template">Select Template*</label>
                    <select id="template" name="template" required>
                        <!-- Populated by JavaScript -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="color_scheme">Color Scheme*</label>
                    <select id="color_scheme" name="color_scheme" required>
                        <!-- Populated by JavaScript -->
                    </select>
                </div>
            </section>

            <!-- Dynamic Content Sections -->
            <section class="form-section" id="contentSections">
                <h3>Document Content</h3>
                <button type="button" class="add-section-btn" onclick="addContentSection()">Add Content Section</button>
                <!-- Dynamically populated based on template selection -->
            </section>

            <!-- Advanced Features -->
            <section class="form-section">
                <h3>Advanced Features</h3>
                <div class="feature-buttons">
                    <button type="button" onclick="addChart()">Add Chart</button>
                    <button type="button" onclick="addTable()">Add Table</button>
                    <button type="button" onclick="addCodeBlock()">Add Code Block</button>
                </div>
                <div id="advancedFeatures">
                    <!-- Dynamically populated when features are added -->
                </div>
            </section>

            <button type="submit" class="generate-btn">Generate Document</button>
        </form>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
